<!DOCTYPE html>
<html>

<head>

<title>Dashboard Kriminalitas</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<nav class="navbar">

<div class="logo">GeoPortal</div>

<div class="menu">

<a href="index.html">Peta</a>

</div>

</nav>

<div class="dashboard">

<div class="card">

<h3>Total Laporan</h3>
<p id="total"></p>

</div>

<div class="card">

<h3>Laporan Baru</h3>
<p id="baru"></p>

</div>

<div class="card">

<h3>Sedang Diproses</h3>
<p id="progress"></p>

</div>

<div class="card">

<h3>Selesai</h3>
<p id="selesai"></p>

</div>

</div>

<div class="tableArea">

<h2>Data Laporan</h2>

<table>

<thead>

<tr>
<th>Nama</th>
<th>Kategori</th>
<th>Status</th>
<th>Lokasi</th>
</tr>

</thead>

<tbody id="tableData"></tbody>

</table>

</div>

<script type="module" src="js/dashboard.js"></script>

</body>

</html>
