<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - GeoPortal Kriminalitas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> <!-- Chart.js -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-slate-100 font-sans text-slate-800 min-h-screen flex flex-col">

    <!-- Navbar -->
    <nav class="bg-slate-900 text-white px-6 py-3 flex justify-between items-center shadow-md">
        <div class="flex items-center space-x-3">
            <div class="text-2xl">🛡️</div>
            <div>
                <h1 class="font-bold text-lg leading-tight">GeoPortal</h1>
                <p class="text-xs text-slate-400">Dashboard Analitik</p>
            </div>
        </div>
        <div class="hidden md:flex space-x-6 text-sm">
            <a href="index.html" class="hover:text-blue-300">Beranda</a>
            <a href="dashboard.html" class="text-blue-400 border-b-2 border-blue-400 pb-1">Dashboard</a>
        </div>
    </nav>

    <!-- Dashboard Content -->
    <main class="p-6 flex-1 max-w-7xl mx-auto w-full">
        
        <!-- Summary Cards -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-5 rounded-lg shadow-sm border border-slate-200">
                <h3 class="text-slate-500 text-sm font-semibold">Total Laporan Masuk</h3>
                <p id="totalLaporan" class="text-3xl font-bold text-slate-800 mt-2">0</p>
            </div>
            <div class="bg-white p-5 rounded-lg shadow-sm border border-slate-200">
                <h3 class="text-slate-500 text-sm font-semibold">Laporan Baru</h3>
                <p id="laporanBaru" class="text-3xl font-bold text-red-500 mt-2">0</p>
            </div>
            <div class="bg-white p-5 rounded-lg shadow-sm border border-slate-200">
                <h3 class="text-slate-500 text-sm font-semibold">Selesai Ditinjau</h3>
                <p id="laporanSelesai" class="text-3xl font-bold text-green-500 mt-2">0</p>
            </div>
        </div>

        <!-- Charts Row -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div class="bg-white p-5 rounded-lg shadow-sm border border-slate-200">
                <h3 class="font-bold text-slate-700 mb-4">Grafik Kategori Kriminalitas</h3>
                <canvas id="kategoriChart"></canvas>
            </div>
            <div class="bg-white p-5 rounded-lg shadow-sm border border-slate-200 overflow-x-auto">
                <h3 class="font-bold text-slate-700 mb-4">Data Laporan Terbaru</h3>
                <table class="w-full text-left text-sm">
                    <thead>
                        <tr class="border-b text-slate-500">
                            <th class="py-2">Pelapor</th>
                            <th class="py-2">Kategori</th>
                            <th class="py-2">Status</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="3" class="text-center py-4 text-slate-400">Memuat data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

    </main>

    <!-- Dashboard Logic -->
    <script type="module" src="js/dashboard.js"></script>
</body>
</html>
