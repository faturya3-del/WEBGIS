<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>Geoportal Pengaduan</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="style.css"/>

</head>

<body>

<div id="sidebar">

<h2>Pengaduan Masyarakat</h2>

<form id="laporanForm">

Nama<br>
<input type="text" id="nama" required><br><br>

Daerah<br>
<input type="text" id="daerah"><br><br>

Kontak<br>
<input type="text" id="kontak"><br><br>

Keterangan<br>
<textarea id="keterangan"></textarea><br><br>

Latitude<br>
<input type="text" id="lat" readonly><br>

Longitude<br>
<input type="text" id="lng" readonly><br><br>

Upload Foto<br>
<input type="file" id="foto"><br><br>

<button type="submit">Kirim Laporan</button>

</form>

<hr>

<button onclick="window.location='dashboard.html'">
Lihat Dashboard
</button>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="script.js"></script>

</body>
</html>
