<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>GeoPortal - Beranda</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-slate-50 h-screen flex flex-col overflow-hidden">
    <!-- Nav -->
    <nav class="bg-slate-900 text-white p-4 flex justify-between shadow-lg">
        <div class="font-bold uppercase tracking-widest">🛡️ GeoPortal</div>
        <div class="flex gap-4 text-sm">
            <a href="index.html" class="text-blue-400 font-bold border-b-2 border-blue-400">Beranda</a>
            <a href="dashboard.html" class="hover:text-blue-300">Dashboard</a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-1 flex p-4 gap-4 overflow-hidden">
        <aside class="w-80 bg-white p-5 rounded-lg shadow-md overflow-y-auto border border-slate-200">
            <h2 class="font-bold text-lg mb-4">Buat Laporan</h2>
            <form id="laporanForm" class="space-y-4">
                <input type="text" id="nama" placeholder="Nama Pelapor" required class="w-full border p-2 rounded text-sm outline-none focus:border-blue-500">
                <select id="kategori" required class="w-full border p-2 rounded text-sm outline-none">
                    <option value="">Pilih Kategori</option>
                    <option value="Pencurian">Pencurian</option>
                    <option value="Perampokan">Perampokan</option>
                    <option value="Kekerasan">Kekerasan</option>
                </select>
                <textarea id="keterangan" placeholder="Keterangan Detail" required class="w-full border p-2 rounded text-sm h-24 outline-none focus:border-blue-500"></textarea>
                
                <div class="border-2 border-dashed p-4 text-center rounded bg-slate-50 relative group">
                    <input type="file" id="foto" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer">
                    <p class="text-[10px] text-blue-600 font-bold uppercase">Upload Foto (Opsional)</p>
                    <p id="fileName" class="text-[10px] text-slate-500 truncate mt-1"></p>
                </div>

                <div class="flex gap-2 bg-blue-50 p-2 rounded border border-blue-100">
                    <input type="text" id="lat" readonly placeholder="Lat" class="w-1/2 text-xs p-1 bg-transparent border-none outline-none font-mono">
                    <input type="text" id="lng" readonly placeholder="Lng" class="w-1/2 text-xs p-1 bg-transparent border-none outline-none font-mono">
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white font-bold py-2 rounded shadow btn-primary">Kirim Laporan</button>
            </form>
        </aside>

        <section class="flex-1 bg-white rounded-lg shadow-md relative overflow-hidden">
            <div id="map"></div>
        </section>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module" src="js/map.js"></script>
</body>
</html>
