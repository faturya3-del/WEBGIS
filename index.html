<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoPortal - Pengaduan Kriminalitas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-slate-100 h-screen flex flex-col overflow-hidden font-sans">
    <!-- Navbar -->
    <nav class="bg-slate-900 text-white px-6 py-4 flex justify-between items-center shadow-md">
        <div>
            <span class="font-bold text-lg flex items-center gap-2">
                <span class="text-blue-500">🛡️</span> GeoPortal
            </span>
            <span class="text-xs text-slate-400 block">Pengaduan Kriminalitas Masyarakat</span>
        </div>
        <div class="flex gap-6 text-sm items-center">
            <a href="index.html" class="text-white border-b-2 border-blue-500 pb-1">Beranda</a>
            <a href="dashboard.html" class="text-slate-300 hover:text-white">Dashboard</a>
            <a href="dashboard.html" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-md font-medium transition">Ke Dashboard</a>
        </div>
    </nav>

    <!-- Content -->
    <main class="flex-1 flex gap-4 p-4 overflow-hidden">
        <!-- Sidebar Form -->
        <aside class="w-[350px] bg-white p-5 rounded-lg shadow-sm border border-slate-200 overflow-y-auto flex flex-col gap-4">
            <div>
                <h2 class="font-bold text-lg flex items-center gap-2">📝 Buat Laporan</h2>
                <p class="text-xs text-slate-500 mt-1">Klik pada peta untuk menentukan lokasi kejadian</p>
            </div>
            
            <form id="laporanForm" class="flex flex-col gap-4">
                <div>
                    <label class="text-xs font-semibold text-slate-700">Nama Pelapor</label>
                    <input type="text" id="nama" placeholder="Masukkan nama lengkap" required class="w-full border border-slate-300 p-2 rounded text-sm outline-none focus:border-blue-500 mt-1">
                </div>

                <div>
                    <label class="text-xs font-semibold text-slate-700">Kategori Kriminalitas</label>
                    <select id="kategori" required class="w-full border border-slate-300 p-2 rounded text-sm outline-none focus:border-blue-500 mt-1">
                        <option value="">Pilih kategori</option>
                        <option value="Pencurian">Pencurian</option>
                        <option value="Perampokan">Perampokan</option>
                        <option value="Kekerasan">Kekerasan</option>
                        <option value="Narkoba">Narkoba</option>
                    </select>
                </div>

                <div>
                    <label class="text-xs font-semibold text-slate-700">Keterangan Detail</label>
                    <textarea id="keterangan" placeholder="Jelaskan kronologi kejadian..." required class="w-full border border-slate-300 p-2 rounded text-sm h-24 outline-none focus:border-blue-500 mt-1 resize-none"></textarea>
                </div>
                
                <div>
                    <label class="text-xs font-semibold text-slate-700">Upload Foto (Opsional)</label>
                    <div class="border-2 border-dashed border-slate-300 p-4 text-center rounded bg-slate-50 relative mt-1 hover:bg-slate-100 transition cursor-pointer">
                        <input type="file" id="foto" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                        <div class="text-slate-400 mb-1">🖼️</div>
                        <p class="text-xs text-blue-600 font-medium">Pilih file <span class="text-slate-500">atau drag and drop</span></p>
                        <p id="fileName" class="text-[10px] text-slate-500 truncate mt-1"></p>
                    </div>
                </div>

                <div class="bg-blue-50/50 border border-blue-100 p-3 rounded">
                    <label class="text-[10px] font-semibold text-blue-800 flex items-center gap-1 mb-2">📍 Koordinat Lokasi (Klik Peta)</label>
                    <div class="flex gap-2">
                        <input type="text" id="lat" readonly placeholder="Lat" class="w-1/2 text-xs p-1.5 border border-slate-200 rounded outline-none bg-white text-slate-600">
                        <input type="text" id="lng" readonly placeholder="Lng" class="w-1/2 text-xs p-1.5 border border-slate-200 rounded outline-none bg-white text-slate-600">
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 rounded transition mt-2">Kirim Laporan</button>
            </form>
        </aside>
<!-- HTML untuk Tombol Login -->
<div id="loginSection" class="p-4 bg-gray-100 rounded mb-4 text-center">
    <p id="teksStatusLogin" class="mb-2 text-sm text-gray-700">Anda melaporkan sebagai Anonim.</p>
    <button id="btnLogin" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Login via Google</button>
    <button id="btnLogout" class="bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700 hidden">Logout</button>
</div>
        
        <!-- Map Area -->
        <section class="flex-1 bg-white rounded-lg shadow-sm border border-slate-200 relative overflow-hidden z-10">
            <div id="map" class="w-full h-full"></div>
        </section>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module" src="js/map.js"></script>
</body>
</html>
